name: Shared Setup
description: Install mise, Rust toolchain, and development dependencies
runs:
  using: "composite"
  steps:
    - uses: jdx/mise-action@v3
    - uses: Swatinem/rust-cache@v2
    - shell: bash
      run: |-
        NIGHTLY_TOOLCHAIN=$(rustup toolchain list | grep nightly | head -1 | awk '{print $1}')
        rustup component add --toolchain "$NIGHTLY_TOOLCHAIN" rustfmt
        rustup component add --toolchain "$NIGHTLY_TOOLCHAIN" clippy
